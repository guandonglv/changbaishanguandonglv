    <script>
        // Language switch functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Get saved language from localStorage or default to English
            let currentLang = localStorage.getItem('preferredLang') || 'en';
            
            // Function to update all text elements
            function updateLanguage(lang) {
                // Update nav links
                document.querySelectorAll('[data-en], [data-ko], [data-ja]').forEach(el => {
                    el.textContent = el.getAttribute(`data-${lang}`);
                });
                
                // Update active language in dropdown
                document.querySelectorAll('.dropdown-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.getAttribute('data-lang') === lang) {
                        item.classList.add('active');
                    }
                });
                
                // Update page title
                const pageTitles = {
                    en: 'Changbai Mountain Guandonglv International Travel',
                    ko: '장백산 관동략 국제 여행',
                    ja: '長白山関東旅国際旅行'
                };
                document.title = pageTitles[lang];
                
                // Update meta description
                const metaDescs = {
                    en: 'Licensed & Insured Inbound Tours to Changbai Mountain',
                    ko: '장백산 입장 여행 라이선스 및 보험 완료',
                    ja: '長白山へのライセンス付き保険付きツアー'
                };
                document.querySelector('meta[name="description"]').setAttribute('content', metaDescs[lang]);
                
                // Save to localStorage
                localStorage.setItem('preferredLang', lang);
            }
            
            // Initial load
            updateLanguage(currentLang);
            
            // Add click event listeners to language dropdown items
            document.querySelectorAll('.dropdown-item[data-lang]').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const lang = this.getAttribute('data-lang');
                    updateLanguage(lang);
                });
            });
        });
    </script>
</body>
</html>
